<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestor Académico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">

    <!-- Sidebar -->
    <aside class="sidebar">
        <h2>Gestor Académico</h2>
        <ul>
            <li><a href="index.html">📊 Inicio</a></li>
            <li><a href="materias.html">📚 Materias</a></li>
            <li><a href="tareas.html">📝 Tareas</a></li>
            <li><a href="examenes.html">📅 Exámenes</a></li>
        </ul>
    </aside>

    <!-- Main -->
    <main class="main">

        <div class="top-bar">
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <h1>Dashboard</h1>
        </div>

        <!-- Tarjetas resumen -->
        <div class="cards">
            <div class="card blue">
                <h3>Materias</h3>
                <p id="totalMaterias">0</p>
            </div>

            <div class="card orange">
                <h3>Tareas Pendientes</h3>
                <p id="tareasPendientes">0</p>
            </div>

            <div class="card yellow">
                <h3>Próximas Entregas</h3>
                <p id="proximasTareas">0</p>
            </div>

            <div class="card red">
                <h3>Exámenes Cercanos</h3>
                <p id="examenesCercanos">0</p>
            </div>
        </div>

        <!-- Progreso -->
        <div class="progress-container">
            <h2>Progreso General</h2>
            <div class="progress-bar">
                <div class="progress" id="barraProgreso">0%</div>
            </div>
        </div>

        <!-- Sección inferior -->
        <div class="bottom">

            <div class="tasks">
                <h2>Lista de Tareas</h2>
                <div id="listaDashboardTareas"></div>
            </div>

            <div class="exams">
                <h2>Próximos Exámenes</h2>
                <div id="listaDashboardExamenes"></div>
            </div>

        </div>

        <!-- BOTONES -->
        <div class="quick-access">
            <a href="materias.html" class="quick-btn">+ Nueva Materia</a>
            <a href="tareas.html" class="quick-btn">+ Nueva Tarea</a>
            <a href="examenes.html" class="quick-btn">+ Nuevo Examen</a>
        </div>

    </main>
</div>

<script src="app.js"></script>

</body>
</html>
