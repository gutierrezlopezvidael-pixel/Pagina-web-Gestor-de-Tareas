<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Materias</title>
<link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="container">

<!-- Sidebar -->
<aside class="sidebar">
<h2>Gestor Académico</h2>

<ul>
<li><a href="index.html">📊 Inicio</a></li>
<li><a href="materias.html">📚 Materias</a></li>
<li><a href="tareas.html">📝 Tareas</a></li>
<li><a href="examenes.html">📅 Exámenes</a></li>
</ul>

</aside>


<!-- Main -->
<main class="main">

<div class="top-bar">
<button class="menu-toggle" onclick="toggleMenu()">☰</button>
<h1>Gestión de Materias</h1>
</div>


<div class="tareas-layout">

<!-- FORMULARIO -->
<div class="form-section">

<h2>➕ Nueva materia</h2>

<div class="form">

<label>Nombre de la materia</label>
<input type="text" id="nombreMateria" placeholder="Ej: Programación">

<label>Profesor</label>
<input type="text" id="profesorMateria" placeholder="Nombre del profesor">

<label>Aula</label>
<input type="text" id="aulaMateria" placeholder="Ej: B203">

<label>Día de clase</label>
<select id="diaMateria">
<option value="Lunes">Lunes</option>
<option value="Martes">Martes</option>
<option value="Miércoles">Miércoles</option>
<option value="Jueves">Jueves</option>
<option value="Viernes">Viernes</option>
</select>

<label>Horario</label>
<input type="time" id="horaMateria">

<label>Color de la materia</label>
<input type="color" id="colorMateria">

<button onclick="agregarMateria()">Agregar materia</button>

</div>

</div>


<!-- LISTA -->
<div class="lista-section">

<h2>📚 Materias registradas</h2>

<div id="listaMaterias"></div>

</div>

</div>

</main>

</div>

<script src="app.js"></script>

</body>
</html>
